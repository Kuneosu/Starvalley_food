name: Daily Menu Update

on:
  schedule:
    # 월~목요일 한국 시간 오전 8시 (UTC 23시 전날)
    # 금요일(5), 토요일(6), 일요일(0) 제외
    - cron: '0 23 * * 0-3'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  update-menu:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Puppeteer browser
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Install dependencies
        run: npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        timeout-minutes: 5

      - name: Download Puppeteer browser
        run: |
          for i in 1 2 3; do
            npx puppeteer browsers install chrome && exit 0
            echo "Puppeteer download failed (attempt $i), retrying..."
            sleep 10
          done
          echo "Puppeteer download failed after 3 attempts"
          exit 1
        timeout-minutes: 15

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64

      - name: Run menu processor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          GITHUB_BRANCH: main
        run: node daily-menu-processor-automated.js
